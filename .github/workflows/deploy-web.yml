# Deploy Expo web app to GitHub Pages (subdomain)
# Triggers on push to main. Configure your subdomain in the env below and in DNS.

name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: github-pages
    env:
      CNAME_SUBDOMAIN: arthub.studiobuda.co.il
      # Same id for Metro bundle, SW stamp, and verify (must be set BEFORE export).
      PWA_BUILD_ID: ${{ github.sha }}
      EXPO_PUBLIC_BUILD_ID: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Expo web
        working-directory: frontend
        run: npx expo export --platform web
        env:
          CI: true
          PWA_BUILD_ID: ${{ env.PWA_BUILD_ID }}
          EXPO_PUBLIC_BUILD_ID: ${{ env.EXPO_PUBLIC_BUILD_ID }}

      - name: Stamp service worker cache version
        working-directory: frontend
        run: node scripts/stamp-sw-version.js
        env:
          PWA_BUILD_ID: ${{ env.PWA_BUILD_ID }}

      - name: Inject SEO meta into index.html
        working-directory: frontend
        run: node scripts/inject-seo-meta.js

      # Prove the deployed SW is not the repo placeholder (public/sw.js stays "vdev").
      - name: Verify stamped service worker version
        working-directory: frontend
        run: node scripts/verify-sw-version.js
        env:
          PWA_BUILD_ID: ${{ env.PWA_BUILD_ID }}

      # GitHub Pages has no file at /reset-password; serving 404.html (same as the SPA
      # shell) lets the app load and React Router can read the path + query.
      - name: GitHub Pages SPA fallback (client-side routes)
        working-directory: frontend/dist
        run: |
          test -f index.html
          test -f sw.js
          test -f build-id.txt
          cp index.html 404.html
          touch .nojekyll

      - name: Add CNAME for subdomain
        working-directory: frontend/dist
        run: echo "${{ env.CNAME_SUBDOMAIN }}" > CNAME

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
